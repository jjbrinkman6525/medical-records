/* dark vignette to help buttons read */
.bg::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, rgba(0,0,0,0.08) 0%, rgba(0,0,0,0.45) 100%);
}

/* ── Layout container ── */
.stage {
  position: relative;
  z-index: 1;
  width: 100%;
  min-height: 100vh;
  /* Tree composition: branches occupy top 55%, trunk occupies lower 45% */
}

/* ── Shared button style ── */
.node {
  position: absolute;
  transform: translate(-50%, -50%);
  text-decoration: none;
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-weight: 700;
  letter-spacing: 0.03em;
  border-radius: 999px;
  transition: all 0.25s ease;
  white-space: nowrap;
  text-align: center;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

/* ── Branch buttons (1-6) — lighter, canopy colours ── */
.branch {
  font-size: clamp(11px, 1.5vw, 15px);
  padding: clamp(5px, 1vh, 8px) clamp(14px, 2.5vw, 22px);
  background: rgba(12, 22, 10, 0.52);
  border: 1px solid rgba(160, 210, 130, 0.45);
  color: rgba(210, 240, 190, 0.92);
  text-shadow: 0 0 8px rgba(120, 200, 80, 0.6);
  box-shadow: 0 2px 12px rgba(0,0,0,0.4), inset 0 1px 0 rgba(180,240,140,0.12);
  backdrop-filter: blur(3px);
}

.branch:hover {
  background: rgba(20, 44, 14, 0.78);
  border-color: rgba(180, 240, 150, 0.75);
  color: #d4f5a8;
  text-shadow: 0 0 14px rgba(150, 255, 100, 0.8);
  box-shadow: 0 4px 20px rgba(100, 200, 60, 0.3), inset 0 1px 0 rgba(200,255,160,0.2);
  transform: translate(-50%, -50%) scale(1.06);
}

/* ── Trunk buttons (7-15) — warmer, bark colours ── */
.trunk {
  font-size: clamp(10px, 1.4vw, 14px);
  padding: clamp(4px, 0.8vh, 7px) clamp(12px, 2vw, 20px);
  background: rgba(18, 10, 4, 0.58);
  border: 1px solid rgba(160, 110, 60, 0.45);
  color: rgba(230, 195, 150, 0.90);
  text-shadow: 0 0 8px rgba(180, 120, 60, 0.5);
  box-shadow: 0 2px 12px rgba(0,0,0,0.5), inset 0 1px 0 rgba(200,150,80,0.1);
  backdrop-filter: blur(3px);
}

.trunk:hover {
  background: rgba(38, 20, 8, 0.82);
  border-color: rgba(210, 155, 80, 0.75);
  color: #f0d090;
  text-shadow: 0 0 14px rgba(220, 160, 80, 0.8);
  box-shadow: 0 4px 20px rgba(160, 100, 40, 0.35), inset 0 1px 0 rgba(240,190,110,0.2);
  transform: translate(-50%, -50%) scale(1.06);
}

/* ── Title ── */
.title-wrap {
  position: absolute;
  top: 2.5vh;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  z-index: 2;
}
.title-wrap h1 {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: clamp(18px, 3.5vw, 34px);
  color: rgba(230, 215, 190, 0.90);
  text-shadow: 0 0 30px rgba(200,160,80,0.4), 0 2px 8px rgba(0,0,0,0.7);
  letter-spacing: 0.08em;
  font-weight: 700;
}
.title-wrap p {
  font-family: 'IBM Plex Mono', monospace;
  font-size: clamp(8px, 1vw, 11px);

/* ══════════════════════════════════════════
   BUTTON POSITIONS — % of viewport
   Mapped to tree anatomy:
   Branches: top 8–52% of page
   Trunk: 55–92% of page
   ══════════════════════════════════════════ */

/* Row 1: Jamie & Marc — top of canopy, symmetrical */
#b-jamie   { left: 35%; top: 14%; }
#b-marc    { left: 65%; top: 14%; }

/* Row 2: Jesse & Raina — balanced second tier */
#b-jesse   { left: 26%; top: 26%; }
#b-raina   { left: 74%; top: 26%; }

/* Row 3: Liam & Killian — third tier */
#b-liam    { left: 20%; top: 39%; }
#b-killian { left: 80%; top: 39%; }

/* Trunk vertical column: Devon, Lane, Austin — centered */
#b-devon   { left: 50%; top: 54%; }
#b-lane    { left: 50%; top: 62%; }
#b-austin  { left: 50%; top: 70%; }

/* Bottom section: 3 pairs + row of 2 */
/* Row 1 bottom: Financial & Assets */
#b-fin     { left: 33%; top: 79%; }
#b-assets  { left: 67%; top: 79%; }

/* Row 2 bottom: Documents & Ancestry */
#b-docs    { left: 33%; top: 86%; }
#b-anc     { left: 67%; top: 86%; }

/* Row 3 bottom: Home-Schooling & Library */
#b-hs      { left: 38%; top: 93%; }
#b-lib     { left: 62%; top: 93%; }

/* ── Mobile layout ── */
@media (max-width: 600px) {
  .node {
    position: static;
    transform: none;
    display: block;
    width: calc(50% - 12px);
    text-align: center;
    margin: 6px;
  }
  .stage { min-height: 100vh; }
  .mobile-grid {
    position: relative;
    z-index: 1;
    padding: 80px 12px 40px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0;
  }
  .mobile-section {
    width: 100%;
    text-align: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(180,180,160,0.5);
    margin: 14px 0 6px;
    padding-bottom: 4px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  #b-jamie, #b-marc, #b-jesse, #b-raina, #b-liam, #b-killian,
  #b-devon, #b-lane, #b-austin, #b-fin, #b-assets, #b-docs,
  #b-anc, #b-hs, #b-lib {
    left: auto; top: auto;
  }
  .title-wrap { top: 16px; }
}

/* fade-in on load */
@keyframes fadeUp {
  from { opacity: 0; transform: translate(-50%, calc(-50% + 8px)); }
  to   { opacity: 1; transform: translate(-50%, -50%); }
}
.node { animation: fadeUp 0.6s ease both; }
#b-jamie   { animation-delay: 0.05s; }
#b-marc    { animation-delay: 0.10s; }
#b-jesse   { animation-delay: 0.15s; }
#b-raina   { animation-delay: 0.20s; }
#b-liam    { animation-delay: 0.25s; }
#b-killian { animation-delay: 0.30s; }
#b-devon   { animation-delay: 0.35s; }
#b-lane    { animation-delay: 0.40s; }
#b-austin  { animation-delay: 0.45s; }
#b-fin     { animation-delay: 0.50s; }
#b-assets  { animation-delay: 0.55s; }
#b-docs    { animation-delay: 0.60s; }
#b-anc     { animation-delay: 0.65s; }
#b-hs      { animation-delay: 0.70s; }
#b-lib     { animation-delay: 0.75s; }

@media (max-width: 600px) {
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .node { animation: fadeUp 0.5s ease both; }
}
